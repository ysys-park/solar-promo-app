<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>내 건물 지붕에 태양광을 설치하면 매달 얼마나 벌 수 있을까?</title>
<meta name="theme-color" content="#111111" />
<meta property="og:title" content="내 지붕에 태양광을 설치하면 매달 얼마나 벌 수 있을까?" />
<meta property="og:description" content="건물면적과 자금비율만 입력하면 태양광 예상 수익을 바로 확인할 수 있습니다." />
<meta property="og:image" content="https://ysys-park.github.io/solar-promo-app/thumbnail5.png" />
<meta property="og:type" content="website" />
<meta property="og:locale" content="ko_KR" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="내 지붕에 태양광을 설치하면 매달 얼마나 벌 수 있을까?" />
<meta name="twitter:description" content="건물면적과 자금비율만 입력하면 태양광 예상 수익을 바로 확인할 수 있습니다." />
<meta name="twitter:image" content="https://ysys-park.github.io/solar-promo-app/thumbnail5.png" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif; background: #eef2f7; color: #111827; }
  .wrap { min-height: 100vh; padding: 16px; display: flex; justify-content: center; align-items: flex-start; }
  .phone { width: 100%; max-width: 430px; background: #fff; border: 4px solid #111; border-radius: 28px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.14); }
  .hero { background: linear-gradient(135deg, #111827 0%, #1f2937 55%, #374151 100%); color: #fff; padding: 26px 18px 22px; }
  .badge { display: inline-block; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18); border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
  .hero h1 { margin: 0; font-size: 28px; line-height: 1.28; font-weight: 900; }
  .hero p { margin: 12px 0 0; font-size: 14px; color: #d1d5db; line-height: 1.55; }
  .body { padding: 16px; }
  .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 22px; padding: 16px; margin-bottom: 14px; }
  .card h2 { margin: 0 0 12px; font-size: 18px; font-weight: 900; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; margin-bottom: 7px; font-size: 14px; font-weight: 800; color: #374151; }
  .input-row { display: flex; align-items: center; gap: 8px; }
  input { width: 100%; padding: 13px 14px; border-radius: 14px; border: 1px solid #d1d5db; font-size: 17px; background: #fff; outline: none; }
  input:focus { border-color: #111; box-shadow: 0 0 0 2px rgba(17,17,17,.08); }
  .unit { min-width: fit-content; font-size: 13px; color: #6b7280; font-weight: 800; }
  .help { margin-top: 6px; font-size: 12px; line-height: 1.5; color: #6b7280; }
  button { width: 100%; border: none; border-radius: 16px; padding: 14px; font-size: 16px; font-weight: 900; cursor: pointer; }
  .btn-primary { background: #111; color: #fff; }
  .btn-secondary { background: #fff; color: #111; border: 1px solid #111; }
  .btn-soft { background: #f3f4f6; color: #111; border: 1px solid #d1d5db; }
  .small-btn { margin-top: 10px; font-size: 13px; padding: 10px 12px; }
  .result-highlight { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 18px; padding: 14px; margin-bottom: 12px; }
  .result-highlight .main { font-size: 24px; font-weight: 900; color: #dc2626; line-height: 1.25; }
  .result-highlight .sub { margin-top: 8px; font-size: 13px; color: #7c2d12; line-height: 1.5; }
  .result-row { display: flex; justify-content: space-between; gap: 12px; padding: 11px 0; border-bottom: 1px solid #eceff3; }
  .result-row:last-child { border-bottom: none; }
  .result-label { font-size: 14px; color: #4b5563; font-weight: 800; }
  .result-value { text-align: right; font-size: 14px; color: #111827; font-weight: 900; word-break: break-all; }
  .cta-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 18px; padding: 14px; margin-top: 12px; }
  .cta-box .title { font-size: 15px; font-weight: 900; color: #1d4ed8; margin-bottom: 6px; }
  .cta-box .text { font-size: 13px; color: #1e3a8a; line-height: 1.55; }
  .hidden { display: none; }
  .footer { text-align: center; font-size: 11px; color: #9ca3af; padding: 2px 0 6px; }
  .settings-panel { margin-top: 14px; padding-top: 12px; border-top: 1px dashed #d1d5db; }
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="hero">
      <div class="badge">무료 간편 분석</div>
      <h1>내 건물 지붕에<br>태양광을 설치하면<br>매달 얼마나 벌 수 있을까?</h1>
      <p>내 건물 면적과 내 자금 비율만 입력하면 태양광 설치 시 예상 수익을 자동으로 분석합니다.</p>
    </div>
    <div class="body">
      <div class="card">
        <h2>간단 입력</h2>
        <div class="field">
          <label for="area">내 건물면적</label>
          <div class="input-row">
            <input id="area" type="text" inputmode="decimal" placeholder="예: 200" />
            <div class="unit">평</div>
          </div>
        </div>
        <div class="field">
          <label for="equity">내 자금비율</label>
          <div class="input-row">
            <input id="equity" type="text" inputmode="decimal" placeholder="예: 20" />
            <div class="unit">%</div>
          </div>
          <div class="help">
            예) 내 자금비율 100%는 무대출<br>
            예) 내 자금비율 0%는 전액 대출
          </div>
        </div>
        <button class="btn-primary" onclick="calculate()">수익 확인하기</button>
        <button class="btn-soft small-btn" onclick="toggleSettings()">설정</button>

        <div id="settingsPanel" class="settings-panel hidden">
          <div class="field">
            <label for="pw">설정 비밀번호</label>
            <div class="input-row">
              <input id="pw" type="password" placeholder="비밀번호 입력" />
            </div>
          </div>
          <button class="btn-secondary small-btn" onclick="unlockSettings()">설정 열기</button>

          <div id="settingsFields" class="hidden">
            <div class="field">
              <label for="factor">건물발전용량환산계수</label>
              <div class="input-row">
                <input id="factor" type="text" inputmode="decimal" value="0.6" />
              </div>
            </div>
            <div class="field">
              <label for="profitPerKw">kW당 발전수익</label>
              <div class="input-row">
                <input id="profitPerKw" type="text" inputmode="decimal" value="200" />
                <div class="unit">원</div>
              </div>
            </div>
            <div class="field">
              <label for="costPerKw">kW당 시공비</label>
              <div class="input-row">
                <input id="costPerKw" type="text" inputmode="decimal" value="1000000" />
                <div class="unit">원</div>
              </div>
            </div>
            <button class="btn-secondary small-btn" onclick="saveSettings()">설정 저장</button>
          </div>
        </div>
      </div>

      <div id="resultCard" class="card hidden">
        <h2>분석결과</h2>
        <div class="result-highlight">
          <div id="monthlyMain" class="main">월 약 0원 수익</div>
          <div class="sub">생각보다 수익이 괜찮죠? 건물 위치를 남겨주시면 더 정확하게 무료로 분석해드립니다.</div>
        </div>

        <div id="resultRows"></div>

        <div class="cta-box">
          <div class="title">정확한 분석을 원하시나요?</div>
          <div class="text">건물 위치를 보내주시면 태양광 설치 가능 여부와 보다 정확한 수익을 검토해드립니다.</div>
        </div>

        <button class="btn-primary" style="margin-top:12px;" onclick="requestDetailed()">내 건물도 가능한지 무료 확인하기</button>
        <button class="btn-secondary" style="margin-top:10px;" onclick="requestSimple()">바로 문의하기</button>
      </div>

      <div class="footer">태양광 홍보용 미리보기 버전</div>
    </div>
  </div>
</div>

<script>
  const PHONE = "01035949967";
  const SETTINGS_PASSWORD = "1234";
  const settings = {
    factor: 0.6,
    profitPerKw: 200,
    costPerKw: 1000000
  };
  let lastResult = null;

  function stripCommas(value) {
    return String(value).replace(/,/g, "").trim();
  }
  function num(value) {
    const cleaned = stripCommas(value);
    if (cleaned === "" || cleaned === null || cleaned === undefined) return NaN;
    return Number(cleaned);
  }
  function formatNumber(value, digits = 0) {
    if (value === null || value === undefined || Number.isNaN(value)) return "";
    return new Intl.NumberFormat("ko-KR", {
      minimumFractionDigits: digits,
      maximumFractionDigits: digits
    }).format(value);
  }
  function sanitizeInput(id) {
    const el = document.getElementById(id);
    el.addEventListener("input", () => {
      let raw = stripCommas(el.value).replace(/[^\d.]/g, "");
      const parts = raw.split(".");
      if (parts.length > 2) raw = parts[0] + "." + parts.slice(1).join("");
      el.value = raw;
    });
  }
  function toggleSettings() {
    document.getElementById("settingsPanel").classList.toggle("hidden");
  }
  function unlockSettings() {
    const pw = document.getElementById("pw").value;
    if (pw !== SETTINGS_PASSWORD) {
      alert("비밀번호가 맞지 않습니다.");
      return;
    }
    document.getElementById("settingsFields").classList.remove("hidden");
  }
  function saveSettings() {
    settings.factor = num(document.getElementById("factor").value);
    settings.profitPerKw = num(document.getElementById("profitPerKw").value);
    settings.costPerKw = num(document.getElementById("costPerKw").value);
    if (Number.isNaN(settings.factor) || Number.isNaN(settings.profitPerKw) || Number.isNaN(settings.costPerKw)) {
      alert("설정값을 확인해주세요.");
      return;
    }
    alert("설정이 저장되었습니다.");
  }
  function calculate() {
    const area = num(document.getElementById("area").value);
    const equityPct = num(document.getElementById("equity").value);
    if (Number.isNaN(area) || Number.isNaN(equityPct)) {
      alert("건물면적과 자금비율을 입력해주세요.");
      return;
    }
    const kw = area * settings.factor;
    const monthly = kw * 3.6 * 30 * settings.profitPerKw;
    const total20 = (monthly * 240) - (settings.costPerKw * kw);
    const totalCost = settings.costPerKw * kw;
    const needCapital = totalCost * (equityPct / 100);

    lastResult = { area, equityPct, kw, monthly, total20, totalCost, needCapital };
    document.getElementById("monthlyMain").textContent = `월 약 ${formatNumber(monthly)}원 수익`;
    document.getElementById("resultRows").innerHTML = `
      <div class="result-row"><div class="result-label">내 건물면적</div><div class="result-value">${formatNumber(area, 2)} 평</div></div>
      <div class="result-row"><div class="result-label">발전용량</div><div class="result-value">${formatNumber(kw, 2)} kW</div></div>
      <div class="result-row"><div class="result-label">월 수익</div><div class="result-value">${formatNumber(monthly)} 원</div></div>
      <div class="result-row"><div class="result-label">20년간 총수익</div><div class="result-value">${formatNumber(total20)} 원</div></div>
      <div class="result-row"><div class="result-label">총 사업비</div><div class="result-value">${formatNumber(totalCost)} 원</div></div>
      <div class="result-row"><div class="result-label">내 필요자금</div><div class="result-value">${formatNumber(needCapital)} 원</div></div>
    `;
    document.getElementById("resultCard").classList.remove("hidden");
  }
  function requestDetailed() {
    if (!lastResult) {
      alert("먼저 분석하기를 눌러주세요.");
      return;
    }
    const body =
      "태양광 수익 분석 결과를 보고 문의드립니다.\n\n" +
      "건물 면적: " + formatNumber(lastResult.area, 2) + "평\n" +
      "예상 발전용량: " + formatNumber(lastResult.kw, 2) + "kW\n" +
      "예상 월 수익: " + formatNumber(lastResult.monthly) + "원\n\n" +
      "건물 주소: \n" +
      "연락처: \n\n" +
      "정확한 분석 부탁드립니다.";
    window.location.href = "sms:" + PHONE + "?body=" + encodeURIComponent(body);
  }
  function requestSimple() {
    const body =
      "태양광 설치 가능 여부와 수익 상담을 받고 싶습니다.\n\n" +
      "연락처: ";
    window.location.href = "sms:" + PHONE + "?body=" + encodeURIComponent(body);
  }
  ["area", "equity", "factor", "profitPerKw", "costPerKw"].forEach(sanitizeInput);
</script>
</body>
</html>
