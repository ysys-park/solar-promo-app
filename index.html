<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>태양광 수익 분석</title>
<meta name="theme-color" content="#111111" />
<meta property="og:title" content="내 건물 지붕에 태양광 설치하면 매달 얼마나 벌 수 있을까?" />
<meta property="og:description" content="건물면적과 내가 투자할 자금비율만 입력하면 자동 분석됩니다." />
<meta property="og:image" content="https://ysys-park.github.io/solar-promo-app/thumbnail.png" />
<meta property="og:type" content="website" />
<meta property="og:locale" content="ko_KR" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="내 건물 지붕에 태양광 설치하면 매달 얼마나 벌 수 있을까?" />
<meta name="twitter:description" content="건물면적과 내가 투자할 자금비율만 입력하면 자동 분석됩니다." />
<meta name="twitter:image" content="https://ysys-park.github.io/solar-promo-app/thumbnail.png" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: "Malgun Gothic","Apple SD Gothic Neo",sans-serif; background: #f5f6f7; color: #111827; }
.wrap { min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 16px; }
.phone { width: 100%; max-width: 430px; background: #fff; border: 4px solid #111; border-radius: 28px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,.14); }
.hero { background: linear-gradient(135deg, #111827 0%, #1f2937 60%, #374151 100%); color: #fff; padding: 24px 18px 20px; }
.hero h1 { margin: 0; font-size: 25px; line-height: 1.4; font-weight: 900; }
.hero p { margin: 10px 0 0; color: #d1d5db; font-size: 14px; line-height: 1.55; }
.section { padding: 18px; }
.card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 22px; padding: 16px; margin-bottom: 14px; }
label { display: block; margin-bottom: 7px; font-size: 14px; font-weight: 800; color: #374151; }
.input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
input, textarea {
  width: 100%; padding: 13px 14px; border-radius: 14px; border: 1px solid #d1d5db;
  font-size: 16px; background: #fff; outline: none; font-family: inherit;
}
input:focus, textarea:focus { border-color: #111; box-shadow: 0 0 0 2px rgba(17,17,17,.08); }
.unit { min-width: fit-content; font-size: 13px; color: #6b7280; font-weight: 800; }
.help { margin-top: -6px; margin-bottom: 14px; font-size: 12px; color: #6b7280; line-height: 1.55; }
button { width: 100%; border: none; border-radius: 16px; padding: 14px; font-size: 16px; font-weight: 900; cursor: pointer; }
.btn-primary { background: #111; color: #fff; }
.btn-secondary { background: #fff; color: #111; border: 1px solid #111; }
.btn-soft { background: #f3f4f6; color: #111; border: 1px solid #d1d5db; }
.hidden { display: none; }
.result-box { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 18px; padding: 14px; margin-bottom: 12px; }
.result-main { font-size: 24px; font-weight: 900; color: #dc2626; line-height: 1.3; }
.result-sub { margin-top: 7px; font-size: 13px; color: #7c2d12; line-height: 1.5; }
.result-row { display: flex; justify-content: space-between; gap: 12px; padding: 11px 0; border-bottom: 1px solid #eceff3; }
.result-row:last-child { border-bottom: none; }
.result-label { font-size: 14px; color: #4b5563; font-weight: 800; }
.result-value { text-align: right; font-size: 14px; color: #111827; font-weight: 900; word-break: break-all; }
.title-sm { margin: 0 0 12px; font-size: 18px; font-weight: 900; }
.footer { text-align: center; font-size: 11px; color: #9ca3af; padding-bottom: 18px; }
.settings-panel { margin-top: 14px; padding-top: 12px; border-top: 1px dashed #d1d5db; }
</style>
</head>
<body>
<div class="wrap">
  <div class="phone">
    <div class="hero">
      <h1>내 건물지붕에 태양광을 설치하면<br>매달 얼마나 벌 수 있을까?</h1>
      <p>건물면적과 내가 투자할 자금비율만 입력하면 자동분석됩니다.</p>
    </div>

    <div id="inputPage" class="section">
      <div class="card">
        <label for="area">태양광을 설치할 내 건물면적을 입력하세요</label>
        <div class="input-row">
          <input id="area" type="text" inputmode="decimal" placeholder="예: 200">
          <div class="unit">평</div>
        </div>

        <label for="equity">내가 투자할 자금비율(%)을 입력하세요</label>
        <div class="input-row">
          <input id="equity" type="text" inputmode="decimal" placeholder="예: 20">
          <div class="unit">%</div>
        </div>

        <div class="help">
          예) 내 자본비율 100%는 무대출<br>
          예) 내 자본비율 0%는 전액 대출
        </div>

        <button class="btn-primary" onclick="calc()">분석하기</button>
        <button class="btn-soft" style="margin-top:10px;" onclick="toggleSettings()">설정</button>

        <div id="settingsPanel" class="settings-panel hidden">
          <label for="pw">비밀번호</label>
          <div class="input-row">
            <input id="pw" type="password" placeholder="비밀번호 입력">
          </div>
          <button class="btn-secondary" onclick="unlockSettings()">설정 열기</button>

          <div id="settingsFields" class="hidden" style="margin-top:12px;">
            <label for="factor">건물발전용량환산계수</label>
            <div class="input-row">
              <input id="factor" type="text" inputmode="decimal" value="0.6">
            </div>

            <label for="profitPerKw">KW당 발전수익</label>
            <div class="input-row">
              <input id="profitPerKw" type="text" inputmode="decimal" value="200">
              <div class="unit">원</div>
            </div>

            <label for="costPerKw">KW당 시공비</label>
            <div class="input-row">
              <input id="costPerKw" type="text" inputmode="decimal" value="1000000">
              <div class="unit">원</div>
            </div>

            <button class="btn-secondary" onclick="saveSettings()">설정 저장</button>
          </div>
        </div>
      </div>
      <div class="footer">태산토목설계 태양광 자동분석기</div>
    </div>

    <div id="resultPage" class="section hidden">
      <div class="card">
        <div class="title-sm">분석결과</div>

        <div class="result-box">
          <div id="monthlyMain" class="result-main">월 약 0원 수익</div>
          <div class="result-sub">건물위치 입력하여 더 정확한 분석을 요청할 수 있습니다.</div>
        </div>

        <div id="resultRows"></div>

        <button class="btn-primary" style="margin-top:14px;" onclick="goRequestPage()">내 건물주소 입력하여 정확히 분석요청하기</button>
      </div>
    </div>

    <div id="requestPage" class="section hidden">
      <div class="card">
        <div class="title-sm">태양광 분석요청</div>
        <div class="help" style="margin-top:0; margin-bottom:12px;">
          아래에 건물주소에 태양광 설치 시 정확한 분석 해주세요
        </div>

        <label for="buildingAddress">건물위치 :</label>
        <div class="input-row" style="margin-bottom:10px;">
          <textarea id="buildingAddress" rows="4" placeholder="건물주소 입력"></textarea>
        </div>

        <button class="btn-primary" onclick="sendRequest()">문자메세지 보내기</button>
        <button class="btn-secondary" style="margin-top:10px;" onclick="goResultPage()">뒤로가기</button>
      </div>
    </div>
  </div>
</div>

<script>
const PHONE = "01035949967";
const SETTINGS_PASSWORD = "1234";
const settings = {
  factor: 0.6,
  profitPerKw: 200,
  costPerKw: 1000000
};
let calcData = null;

function qs(id){ return document.getElementById(id); }
function stripCommas(v){ return String(v).replace(/,/g, "").trim(); }
function num(v){
  const c = stripCommas(v);
  if (c === "" || c === null || c === undefined) return NaN;
  return Number(c);
}
function formatNumber(v, d=0){
  if (v === null || v === undefined || Number.isNaN(v)) return "";
  return new Intl.NumberFormat("ko-KR", {
    minimumFractionDigits: d,
    maximumFractionDigits: d
  }).format(v);
}
function sanitizeInput(id){
  qs(id).addEventListener("input", () => {
    let raw = stripCommas(qs(id).value).replace(/[^\d.]/g, "");
    const parts = raw.split(".");
    if (parts.length > 2) raw = parts[0] + "." + parts.slice(1).join("");
    qs(id).value = raw;
  });
}
["area","equity","factor","profitPerKw","costPerKw"].forEach(sanitizeInput);

function show(page){
  ["inputPage","resultPage","requestPage"].forEach(id => qs(id).classList.add("hidden"));
  qs(page).classList.remove("hidden");
}
function toggleSettings(){
  qs("settingsPanel").classList.toggle("hidden");
}
function unlockSettings(){
  if (qs("pw").value !== SETTINGS_PASSWORD){
    alert("비밀번호가 맞지 않습니다.");
    return;
  }
  qs("settingsFields").classList.remove("hidden");
}
function saveSettings(){
  settings.factor = num(qs("factor").value);
  settings.profitPerKw = num(qs("profitPerKw").value);
  settings.costPerKw = num(qs("costPerKw").value);
  if (Number.isNaN(settings.factor) || Number.isNaN(settings.profitPerKw) || Number.isNaN(settings.costPerKw)){
    alert("설정값을 확인해주세요.");
    return;
  }
  alert("설정이 저장되었습니다.");
}
function calc(){
  const area = num(qs("area").value);
  const equityPct = num(qs("equity").value);

  if (Number.isNaN(area) || Number.isNaN(equityPct)){
    alert("건물면적과 자금비율을 입력하세요.");
    return;
  }

  const kw = area * settings.factor;
  const monthly = kw * 3.6 * 30 * settings.profitPerKw;
  const total20 = (monthly * 240) - (settings.costPerKw * kw);
  const totalCost = settings.costPerKw * kw;
  const needCapital = totalCost * (equityPct / 100);

  calcData = { area, equityPct, kw, monthly, total20, totalCost, needCapital };

  qs("monthlyMain").textContent = `월 약 ${formatNumber(monthly)}원 수익`;
  qs("resultRows").innerHTML = `
    <div class="result-row"><div class="result-label">내 건물면적</div><div class="result-value">${formatNumber(area, 2)} 평</div></div>
    <div class="result-row"><div class="result-label">발전용량</div><div class="result-value">${formatNumber(kw, 2)} kW</div></div>
    <div class="result-row"><div class="result-label">월 수익</div><div class="result-value">${formatNumber(monthly)} 원</div></div>
    <div class="result-row"><div class="result-label">20년간 총수익</div><div class="result-value">${formatNumber(total20)} 원</div></div>
    <div class="result-row"><div class="result-label">총 사업비</div><div class="result-value">${formatNumber(totalCost)} 원</div></div>
    <div class="result-row"><div class="result-label">내 필요자금</div><div class="result-value">${formatNumber(needCapital)} 원</div></div>
  `;
  show("resultPage");
}
function goRequestPage(){
  if (!calcData){
    alert("먼저 분석하기를 눌러주세요.");
    return;
  }
  show("requestPage");
}
function goResultPage(){
  show("resultPage");
}
function sendRequest(){
  if (!calcData){
    alert("먼저 분석하기를 눌러주세요.");
    return;
  }
  const addr = qs("buildingAddress").value.trim();
  const body =
`태양광 수익분석 결과를 보고 문의드립니다.

건물면적 : ${formatNumber(calcData.area, 2)}평
예상발전용량 : ${formatNumber(calcData.kw, 2)}kw
예상월수익 : ${formatNumber(calcData.monthly)}원

건물주소 : ${addr}
연락처 :

정확한 분석 부탁드립니다.`;

  window.location.href = "sms:" + PHONE + "?body=" + encodeURIComponent(body);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
